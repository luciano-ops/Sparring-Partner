<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Best Countdown Ever</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Inter:wght@300;400;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
    background: #0a1628;
  }

  /* Slideshow backgrounds - Sugar Bowl / Truckee skiing */
  .bg-slide {
    position: fixed;
    inset: 0;
    z-index: 0;
    background-size: cover;
    background-position: center;
    opacity: 0;
    transition: opacity 2.5s ease-in-out;
    animation: slowZoom 80s ease-in-out infinite alternate;
  }

  .bg-slide.active {
    opacity: 1;
  }

  .bg-slide:nth-child(1) {
    /* Snowy mountain peaks - Sierra Nevada style */
    background-image:
      linear-gradient(
        to bottom,
        rgba(8, 15, 30, 0.2) 0%,
        rgba(8, 15, 30, 0.05) 30%,
        rgba(8, 15, 30, 0.1) 60%,
        rgba(8, 15, 30, 0.45) 100%
      ),
      url('https://images.unsplash.com/photo-1551524559-8af4e6624178?w=1920&q=85');
  }

  .bg-slide:nth-child(2) {
    /* Powder skiing on mountain */
    background-image:
      linear-gradient(
        to bottom,
        rgba(8, 15, 30, 0.2) 0%,
        rgba(8, 15, 30, 0.05) 30%,
        rgba(8, 15, 30, 0.1) 60%,
        rgba(8, 15, 30, 0.45) 100%
      ),
      url('https://images.unsplash.com/photo-1605540436563-5bca919ae766?w=1920&q=85');
  }

  .bg-slide:nth-child(3) {
    /* Winter alpine forest and peaks */
    background-image:
      linear-gradient(
        to bottom,
        rgba(8, 15, 30, 0.2) 0%,
        rgba(8, 15, 30, 0.05) 30%,
        rgba(8, 15, 30, 0.1) 60%,
        rgba(8, 15, 30, 0.45) 100%
      ),
      url('https://images.unsplash.com/photo-1418985991508-e47386d96a71?w=1920&q=85');
  }

  .bg-slide:nth-child(4) {
    /* Snow-covered pine trees and ski terrain */
    background-image:
      linear-gradient(
        to bottom,
        rgba(8, 15, 30, 0.2) 0%,
        rgba(8, 15, 30, 0.05) 30%,
        rgba(8, 15, 30, 0.1) 60%,
        rgba(8, 15, 30, 0.45) 100%
      ),
      url('https://images.unsplash.com/photo-1485470733090-0aae1788d668?w=1920&q=85');
  }

  .bg-slide:nth-child(5) {
    /* Fresh powder on alpine slopes */
    background-image:
      linear-gradient(
        to bottom,
        rgba(8, 15, 30, 0.2) 0%,
        rgba(8, 15, 30, 0.05) 30%,
        rgba(8, 15, 30, 0.1) 60%,
        rgba(8, 15, 30, 0.45) 100%
      ),
      url('https://images.unsplash.com/photo-1544966503-7cc5ac882d5a?w=1920&q=85');
  }

  @keyframes slowZoom {
    0% { transform: scale(1); }
    100% { transform: scale(1.06); }
  }

  /* Floating particles container */
  .particles {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
  }

  /* Snowflakes */
  .snowflake {
    position: absolute;
    color: #fff;
    opacity: 0;
    animation: snowfall linear infinite;
    text-shadow: 0 0 4px rgba(200, 220, 255, 0.5);
    user-select: none;
  }

  @keyframes snowfall {
    0% { opacity: 0; transform: translateY(-5vh) rotate(0deg) translateX(0); }
    10% { opacity: 0.8; }
    50% { transform: translateY(50vh) rotate(180deg) translateX(30px); }
    90% { opacity: 0.5; }
    100% { opacity: 0; transform: translateY(105vh) rotate(360deg) translateX(-20px); }
  }

  /* Soft glowing orbs */
  .particle {
    position: absolute;
    border-radius: 50%;
    animation: floatUp linear infinite;
    opacity: 0;
  }

  @keyframes floatUp {
    0% { opacity: 0; transform: translateY(100vh) scale(0); }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { opacity: 0; transform: translateY(-10vh) scale(1); }
  }

  /* Snow glitter */
  .glitter {
    position: absolute;
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: #fff;
    box-shadow: 0 0 6px 2px rgba(180, 210, 255, 0.5), 0 0 15px 4px rgba(180, 210, 255, 0.15);
    animation: glitterPulse linear infinite;
    opacity: 0;
  }

  @keyframes glitterPulse {
    0% { opacity: 0; }
    5% { opacity: 1; }
    50% { opacity: 0.15; }
    95% { opacity: 0.8; }
    100% { opacity: 0; }
  }

  /* Main content */
  .container {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 3rem;
    max-width: 900px;
    width: 90%;
  }

  .glass-card {
    background: rgba(10, 25, 50, 0.7);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border-radius: 30px;
    padding: 3.5rem 3rem;
    border: 1px solid rgba(255, 255, 255, 0.12);
    box-shadow:
      0 8px 32px rgba(0, 0, 0, 0.5),
      inset 0 1px 0 rgba(255, 255, 255, 0.08);
    animation: fadeInUp 1.5s ease-out;
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(40px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .header-icon {
    font-size: 2.5rem;
    margin-bottom: 0.5rem;
    animation: pulse 3s ease-in-out infinite;
    filter: drop-shadow(0 0 10px rgba(140, 180, 255, 0.4));
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.15); }
  }

  .title {
    font-family: 'Montserrat', sans-serif;
    font-size: 2.8rem;
    font-weight: 700;
    color: #fff;
    margin-bottom: 0.3rem;
    text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
    letter-spacing: 2px;
  }

  .subtitle {
    font-family: 'Montserrat', sans-serif;
    font-size: 1.15rem;
    color: #fff;
    margin-bottom: 2.5rem;
    font-weight: 300;
    letter-spacing: 1px;
    opacity: 0.85;
  }

  /* Countdown boxes */
  .countdown {
    display: flex;
    justify-content: center;
    gap: 1.2rem;
    flex-wrap: wrap;
    margin-bottom: 2.5rem;
  }

  .time-unit {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 110px;
  }

  .time-box {
    background: rgba(30, 60, 110, 0.6);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 18px;
    padding: 1.2rem 1.5rem;
    min-width: 110px;
    transition: all 0.4s ease;
    position: relative;
    overflow: hidden;
  }

  .time-box::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
  }

  .time-box:hover {
    background: rgba(40, 75, 130, 0.7);
    border-color: rgba(255, 255, 255, 0.25);
    transform: translateY(-4px);
    box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
  }

  .time-value {
    font-family: 'Montserrat', sans-serif;
    font-size: 3.2rem;
    font-weight: 700;
    color: #fff;
    line-height: 1;
    text-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
    transition: all 0.3s ease;
  }

  .time-value.tick {
    animation: tickPop 0.4s ease-out;
  }

  @keyframes tickPop {
    0% { transform: scale(1); }
    50% { transform: scale(1.1); color: #b8d4ff; }
    100% { transform: scale(1); }
  }

  .time-label {
    font-family: 'Montserrat', sans-serif;
    font-size: 0.75rem;
    color: #fff;
    text-transform: uppercase;
    letter-spacing: 3px;
    margin-top: 0.6rem;
    font-weight: 600;
    opacity: 0.8;
  }

  .separator {
    font-family: 'Montserrat', sans-serif;
    font-size: 2.5rem;
    color: rgba(255, 255, 255, 0.4);
    align-self: center;
    padding-bottom: 1.8rem;
    animation: blink 2s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* Progress bar */
  .progress-section {
    margin-bottom: 1.5rem;
  }

  .progress-bar {
    width: 100%;
    height: 4px;
    background: rgba(255, 255, 255, 0.06);
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 0.6rem;
  }

  .progress-fill {
    height: 100%;
    border-radius: 4px;
    background: linear-gradient(90deg, #4a8fe7, #8ab8ff, #d4e5ff);
    transition: width 1s ease;
    box-shadow: 0 0 10px rgba(100, 170, 255, 0.4);
  }

  .progress-text {
    font-size: 0.85rem;
    color: #fff;
    opacity: 0.7;
  }

  /* Current time */
  .current-time {
    font-size: 0.9rem;
    color: #fff;
    opacity: 0.6;
    letter-spacing: 1px;
  }

  .current-time span {
    opacity: 1;
  }

  /* Bible verse */
  .verse {
    font-family: 'Montserrat', sans-serif;
    font-style: italic;
    font-size: 1rem;
    color: #fff;
    margin-top: 2rem;
    line-height: 1.7;
    max-width: 600px;
    margin-left: auto;
    margin-right: auto;
    opacity: 0.8;
  }

  .verse-ref {
    display: block;
    margin-top: 0.5rem;
    font-size: 0.8rem;
    font-style: normal;
    color: #fff;
    opacity: 0.5;
    letter-spacing: 2px;
  }

  /* Responsive */
  @media (max-width: 700px) {
    .title { font-size: 1.8rem; }
    .countdown { gap: 0.6rem; }
    .time-box { min-width: 70px; padding: 0.8rem 1rem; }
    .time-value { font-size: 2.2rem; }
    .time-label { font-size: 0.65rem; letter-spacing: 2px; }
    .separator { font-size: 1.8rem; padding-bottom: 1.2rem; }
    .glass-card { padding: 2rem 1.5rem; }
    .verse { font-size: 0.95rem; }
  }

  /* Reached state */
  .reached .title {
    animation: glow 2s ease-in-out infinite alternate;
  }

  @keyframes glow {
    from { text-shadow: 0 0 10px rgba(160,200,255,0.3); }
    to { text-shadow: 0 0 30px rgba(160,200,255,0.8), 0 0 60px rgba(200,225,255,0.4); }
  }
</style>
</head>
<body>

<!-- Slideshow backgrounds -->
<div class="bg-slide active"></div>
<div class="bg-slide"></div>
<div class="bg-slide"></div>
<div class="bg-slide"></div>
<div class="bg-slide"></div>

<div class="particles" id="particles"></div>

<div class="container">
  <div class="glass-card" id="card">
    <div class="header-icon">&#x26F7;&#xFE0F;</div>
    <h1 class="title">Best Countdown Ever</h1>
    <p class="subtitle">April 1, 2026 &bull; 5:00 PM PST</p>

    <div class="countdown" id="countdown">
      <div class="time-unit">
        <div class="time-box">
          <div class="time-value" id="days">--</div>
        </div>
        <div class="time-label">Days</div>
      </div>
      <div class="separator">:</div>
      <div class="time-unit">
        <div class="time-box">
          <div class="time-value" id="hours">--</div>
        </div>
        <div class="time-label">Hours</div>
      </div>
      <div class="separator">:</div>
      <div class="time-unit">
        <div class="time-box">
          <div class="time-value" id="minutes">--</div>
        </div>
        <div class="time-label">Minutes</div>
      </div>
      <div class="separator">:</div>
      <div class="time-unit">
        <div class="time-box">
          <div class="time-value" id="seconds">--</div>
        </div>
        <div class="time-label">Seconds</div>
      </div>
    </div>

    <div class="progress-section">
      <div class="progress-bar">
        <div class="progress-fill" id="progress" style="width: 0%"></div>
      </div>
      <div class="progress-text" id="progressText">Loading...</div>
    </div>

    <div class="current-time">
      Current time (PST): <span id="currentTime">--</span>
    </div>

    <div class="verse">
      &ldquo;Therefore what God has joined together, let no one separate.&rdquo;
      <span class="verse-ref">&mdash; Mark 10:9</span>
    </div>
  </div>
</div>

<script>
  // Target: April 1, 2026 at 5:00 PM PST (UTC-8)
  // PST is UTC-8, so 5 PM PST = April 2, 1:00 AM UTC
  const TARGET_UTC = new Date(Date.UTC(2026, 3, 2, 1, 0, 0));

  // When countdown "started" for progress bar
  const START_UTC = new Date(Date.UTC(2026, 2, 2, 0, 0, 0));

  // ─── Background slideshow ───
  const slides = document.querySelectorAll('.bg-slide');
  let currentSlide = 0;

  function nextSlide() {
    slides[currentSlide].classList.remove('active');
    currentSlide = (currentSlide + 1) % slides.length;
    slides[currentSlide].classList.add('active');
  }
  setInterval(nextSlide, 12000);

  // ─── Time helpers ───
  function formatPST(date) {
    return date.toLocaleString('en-US', {
      timeZone: 'America/Los_Angeles',
      weekday: 'long',
      month: 'long',
      day: 'numeric',
      year: 'numeric',
      hour: 'numeric',
      minute: '2-digit',
      second: '2-digit',
      hour12: true,
    }) + ' PST';
  }

  // ─── Countdown ───
  let prevValues = { days: '', hours: '', minutes: '', seconds: '' };

  function updateCountdown() {
    const now = new Date();
    const diff = TARGET_UTC - now;

    document.getElementById('currentTime').textContent = formatPST(now);

    if (diff <= 0) {
      document.getElementById('days').textContent = '00';
      document.getElementById('hours').textContent = '00';
      document.getElementById('minutes').textContent = '00';
      document.getElementById('seconds').textContent = '00';
      document.getElementById('progressText').textContent = 'The moment is here!';
      document.getElementById('progress').style.width = '100%';
      document.getElementById('card').classList.add('reached');
      return;
    }

    const totalSec = Math.floor(diff / 1000);
    const d = Math.floor(totalSec / 86400);
    const h = Math.floor((totalSec % 86400) / 3600);
    const m = Math.floor((totalSec % 3600) / 60);
    const s = totalSec % 60;

    const vals = {
      days: String(d).padStart(2, '0'),
      hours: String(h).padStart(2, '0'),
      minutes: String(m).padStart(2, '0'),
      seconds: String(s).padStart(2, '0'),
    };

    for (const key of ['days', 'hours', 'minutes', 'seconds']) {
      const el = document.getElementById(key);
      if (vals[key] !== prevValues[key]) {
        el.textContent = vals[key];
        el.classList.remove('tick');
        void el.offsetWidth;
        el.classList.add('tick');
      }
    }
    prevValues = { ...vals };

    // Progress
    const totalDuration = TARGET_UTC - START_UTC;
    const elapsed = now - START_UTC;
    const pct = Math.min(100, Math.max(0, (elapsed / totalDuration) * 100));
    document.getElementById('progress').style.width = pct.toFixed(2) + '%';
    document.getElementById('progressText').textContent = pct.toFixed(1) + '% of the wait is over';
  }

  // ─── Particles ───
  function createParticles() {
    const container = document.getElementById('particles');
    const snowChars = ['\u2744', '\u2746', '\u2745', '\u00B7', '*'];

    // Falling snowflakes
    for (let i = 0; i < 35; i++) {
      const s = document.createElement('div');
      s.className = 'snowflake';
      const size = Math.random() * 14 + 6;
      s.textContent = snowChars[Math.floor(Math.random() * snowChars.length)];
      s.style.cssText = `
        left:${Math.random() * 100}%;
        font-size:${size}px;
        animation-duration:${Math.random() * 12 + 8}s;
        animation-delay:${Math.random() * 15}s;
        opacity:0;
      `;
      container.appendChild(s);
    }

    // Soft glowing orbs (blue/white tones)
    for (let i = 0; i < 10; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = Math.random() * 5 + 2;
      const col = Math.random() > 0.5
        ? `rgba(160,200,255,${Math.random() * 0.3 + 0.05})`
        : `rgba(255,255,255,${Math.random() * 0.2 + 0.03})`;
      p.style.cssText = `
        width:${size}px; height:${size}px;
        left:${Math.random() * 100}%;
        background:${col};
        box-shadow: 0 0 ${size * 3}px ${col};
        animation-duration:${Math.random() * 15 + 10}s;
        animation-delay:${Math.random() * 15}s;
      `;
      container.appendChild(p);
    }

    // Snow glitter
    for (let i = 0; i < 18; i++) {
      const g = document.createElement('div');
      g.className = 'glitter';
      const dur = Math.random() * 10 + 6;
      const x1 = Math.random() * 100;
      const y1 = Math.random() * 100;
      const dx = (Math.random() - 0.5) * 20;
      const dy = (Math.random() - 0.5) * 20;
      g.style.cssText = `
        left:${x1}%; top:${y1}%;
        animation-duration:${dur}s;
        animation-delay:${Math.random() * dur}s;
      `;
      g.animate([
        { transform: 'translate(0,0)' },
        { transform: `translate(${dx}vw, ${dy}vh)` },
        { transform: `translate(${-dx * 0.5}vw, ${-dy * 0.3}vh)` },
        { transform: 'translate(0,0)' },
      ], { duration: dur * 1000, iterations: Infinity, easing: 'ease-in-out' });
      container.appendChild(g);
    }
  }

  createParticles();
  updateCountdown();
  setInterval(updateCountdown, 1000);
</script>

</body>
</html>
